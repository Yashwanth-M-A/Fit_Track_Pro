<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="FitTrack Pro — Log in or create your free account to start tracking workouts, diet, goals, and progress."/>
  <title>FitTrack Pro — Login &amp; Register</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    body.auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #eff6ff 0%, #f0f9ff 50%, #f5f3ff 100%);
      padding: 24px 16px;
    }

    .auth-card {
      width: 100%;
      max-width: 440px;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      box-shadow: 0 8px 32px rgba(37,99,235,0.08), 0 1px 4px rgba(0,0,0,0.06);
      padding: 36px 40px 32px;
      animation: fadeUp 0.32s ease both;
    }

    .auth-logo-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 24px;
    }

    .auth-logo-mark {
      width: 38px; height: 38px;
      background: var(--accent-g);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
    }

    .auth-logo-mark svg {
      width: 20px; height: 20px;
      fill: #fff;
    }

    .auth-logo-name {
      font-size: 17px;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -0.3px;
    }

    .auth-divider {
      width: 40px;
      height: 3px;
      background: var(--accent-g);
      border-radius: 4px;
      margin-bottom: 20px;
    }

    .auth-heading { font-size: 22px; font-weight: 800; color: var(--text); margin-bottom: 3px; letter-spacing: -0.4px; }
    .auth-subheading { font-size: 13px; color: var(--muted); margin-bottom: 22px; }
  </style>
</head>
<body class="auth-page">

  <div class="auth-card">

    <!-- Logo -->
    <div class="auth-logo-row">
      <div class="auth-logo-mark" style="overflow:hidden;padding:0;">
        <img src="/images/logo.png" alt="FitTrack Pro" style="width:100%;height:100%;object-fit:cover;border-radius:10px;"/>
      </div>
      <span class="auth-logo-name">FitTrack Pro</span>
    </div>

    <div class="auth-divider"></div>
    <div class="auth-heading" id="auth-heading">Welcome back</div>
    <div class="auth-subheading" id="auth-subheading">Sign in to continue your fitness journey</div>

    <!-- Tabs -->
    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login"    onclick="switchTab('login')">Sign In</button>
      <button class="auth-tab"        id="tab-register" onclick="switchTab('register')">Create Account</button>
    </div>

    <!-- Login Form -->
    <form class="auth-form active" id="form-login" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label class="form-label" for="login-email">Email Address</label>
        <input class="form-control" id="login-email" type="email" placeholder="you@example.com" autocomplete="email" required/>
      </div>
      <div class="form-group">
        <label class="form-label" for="login-password">Password</label>
        <input class="form-control" id="login-password" type="password" placeholder="Your password" autocomplete="current-password" required/>
      </div>
      <div class="form-error" id="login-error"></div>
      <button class="btn btn-primary" type="submit" id="btn-login"
        style="width:100%;margin-top:8px;justify-content:center;padding:11px;font-size:14px;">
        Sign In
      </button>
    </form>

    <!-- Register Form -->
    <form class="auth-form" id="form-register" onsubmit="handleRegister(event)">
      <div class="form-group">
        <label class="form-label" for="reg-name">Full Name</label>
        <input class="form-control" id="reg-name" type="text" placeholder="John Doe" autocomplete="name" required/>
      </div>
      <div class="form-group">
        <label class="form-label" for="reg-email">Email Address</label>
        <input class="form-control" id="reg-email" type="email" placeholder="you@example.com" autocomplete="email" required/>
      </div>
      <div class="form-group">
        <label class="form-label" for="reg-password">Password</label>
        <input class="form-control" id="reg-password" type="password" placeholder="Min. 6 characters" autocomplete="new-password" required minlength="6"/>
      </div>
      <div class="form-row cols-3">
        <div class="form-group">
          <label class="form-label" for="reg-weight">Weight (kg)</label>
          <input class="form-control" id="reg-weight" type="number" placeholder="70" min="0" step="0.1"/>
        </div>
        <div class="form-group">
          <label class="form-label" for="reg-height">Height (cm)</label>
          <input class="form-control" id="reg-height" type="number" placeholder="175" min="0"/>
        </div>
        <div class="form-group">
          <label class="form-label" for="reg-age">Age</label>
          <input class="form-control" id="reg-age" type="number" placeholder="25" min="0" max="120"/>
        </div>
      </div>
      <div class="form-error" id="reg-error"></div>
      <button class="btn btn-primary" type="submit" id="btn-register"
        style="width:100%;margin-top:8px;justify-content:center;padding:11px;font-size:14px;">
        Create Free Account
      </button>
    </form>

    <p style="font-size:11.5px;color:var(--light);text-align:center;margin-top:18px;">
      By continuing you agree to our Terms of Service and Privacy Policy
    </p>
  </div>

  <div class="toast" id="toast"></div>
  <script>
    if (localStorage.getItem("token")) window.location.href = "/dashboard.html";

    function switchTab(tab) {
      ["login","register"].forEach(t => {
        document.getElementById(`form-${t}`).classList.toggle("active", t === tab);
        document.getElementById(`tab-${t}`).classList.toggle("active",  t === tab);
      });
      const isLogin = tab === "login";
      document.getElementById("auth-heading").textContent    = isLogin ? "Welcome back"        : "Create your account";
      document.getElementById("auth-subheading").textContent = isLogin
        ? "Sign in to continue your fitness journey"
        : "Start your fitness journey today — it's free";
      clearErrors();
    }

    function clearErrors() {
      ["login-error","reg-error"].forEach(id => {
        const el = document.getElementById(id);
        el.textContent = ""; el.classList.remove("show");
      });
    }

    function showError(id, msg) {
      const el = document.getElementById(id);
      el.textContent = msg; el.classList.add("show");
    }

    function setLoading(btnId, loading) {
      const btn = document.getElementById(btnId);
      btn.disabled = loading;
      btn.innerHTML = loading
        ? '<span class="spinner"></span>&nbsp;Please wait...'
        : (btnId === "btn-login" ? "Sign In" : "Create Free Account");
    }

    async function handleLogin(e) {
      e.preventDefault(); clearErrors();
      setLoading("btn-login", true);
      try {
        const res  = await fetch("/api/auth/login", {
          method:"POST", headers:{"Content-Type":"application/json"},
          body: JSON.stringify({
            email:    document.getElementById("login-email").value.trim(),
            password: document.getElementById("login-password").value
          })
        });
        const data = await res.json();
        if (!res.ok) { showError("login-error", data.error || "Login failed"); return; }
        localStorage.setItem("token", data.token);
        window.location.href = "/dashboard.html";
      } catch { showError("login-error", "Network error. Please try again."); }
      finally { setLoading("btn-login", false); }
    }

    async function handleRegister(e) {
      e.preventDefault(); clearErrors();
      setLoading("btn-register", true);
      try {
        const body = {
          name:     document.getElementById("reg-name").value.trim(),
          email:    document.getElementById("reg-email").value.trim(),
          password: document.getElementById("reg-password").value,
          weight:   parseFloat(document.getElementById("reg-weight").value) || 0,
          height:   parseFloat(document.getElementById("reg-height").value) || 0,
          age:      parseInt(document.getElementById("reg-age").value)      || 0
        };
        const res  = await fetch("/api/auth/register", {
          method:"POST", headers:{"Content-Type":"application/json"},
          body: JSON.stringify(body)
        });
        const data = await res.json();
        if (!res.ok) { showError("reg-error", data.error || "Registration failed"); return; }
        localStorage.setItem("token", data.token);
        window.location.href = "/dashboard.html";
      } catch { showError("reg-error", "Network error. Please try again."); }
      finally { setLoading("btn-register", false); }
    }

    function toast(msg) {
      const el = document.getElementById("toast");
      if (!el) return;
      el.textContent = msg; el.classList.add("show");
      setTimeout(() => el.classList.remove("show"), 2800);
    }
  </script>
</body>
</html>
